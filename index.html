<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cardiac Monitor - ECG Visualization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary: #ff3838;
      --primary-dark: #e02c39;
      --secondary: #0f172a;
      --text: #f1f5f9;
      --background: #020617;
      --panel-bg: #1e293b;
      --graph-bg: #000000;
      --success: #2ed573;
      --btn-bg: transparent;
      --btn-border: rgba(255, 255, 255, 0.75);
      --btn-text: #ffffff;
      --popup-bg: rgba(8, 14, 28, 0.35);
    }

    [data-theme="light"] {
      --primary: #ff3838;
      --primary-dark: #e02c39;
      --secondary: #e2e8f0;
      --text: #0f172a;
      --background: #ffffff;
      --panel-bg: #e9ecef;
      --graph-bg: #ffffff;
      /* Overlay on white graph needs a dark tint to be readable */
      --btn-bg: transparent;
      --btn-border: rgba(0, 0, 0, 0.7);
      --btn-text: #000000;
      --popup-bg: rgba(232, 236, 242, 0.35);
    }

    /* Base styles */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
      transition: all 0.3s ease;
      touch-action: manipulation;
    }

    /* Fullscreen canvas container */
    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--graph-bg);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      /* No background here — WebGL clears to transparent, so the
         container's background-color + grid pattern show through. */
    }

    /* Overlay for timer and BPM */
    .overlay-top {
      position: absolute;
      bottom: 20px;
      left: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
    }

    /* Fullscreen + theme buttons grouped at bottom-right */
    .bottom-right-group {
      position: absolute;
      bottom: 20px;
      right: 15px;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
      z-index: 20;
    }

    .bottom-right-group .fullscreen-theme-toggle {
      position: static;
    }

    .overlay-metric {
      color: var(--text);
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .overlay-bpm {
      padding: 0 16px;
      height: 40px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--btn-text);
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      border: 2px solid var(--btn-border);
      border-radius: 10px;
      background: transparent;
    }

    .overlay-bpm span {
      display: inline-block;
      min-width: 4.5em;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .heart-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      overflow: visible;
    }

    .heart-icon path {
      fill: transparent;
      stroke: var(--btn-border);
      stroke-width: 2;
      stroke-linejoin: round;
      transition: fill 0.15s ease-out;
    }

    .heart-icon.beating path {
      fill: var(--primary);
    }

    /* Fullscreen toggle button */
    .fullscreen-btn {
      background: transparent;
      border: 2px solid var(--btn-border);
      color: var(--btn-text);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }

    .fullscreen-btn:focus,
    .fullscreen-btn:focus-visible {
      outline: none;
    }

    .fullscreen-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: scale(1.15);
    }

    .fullscreen-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 0.5;
    }

    /* Controls overlay */
    .controls-overlay {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 15;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
    }

    /* === Scrubber minimap (shown when paused) === */
    .minimap-wrap {
      position: absolute;
      bottom: 68px;
      left: 12px;
      right: 12px;
      height: 50px;
      pointer-events: auto;
      z-index: 10;
      display: none;
    }

    .minimap-track {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--btn-border);
      overflow: hidden;
    }

    [data-theme="light"] .minimap-track {
      background: rgba(255, 255, 255, 0.22);
    }

    .minimap-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .minimap-viewport {
      position: absolute;
      top: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.18);
      border-left: 1.5px solid rgba(255, 255, 255, 0.55);
      border-right: 1.5px solid rgba(255, 255, 255, 0.55);
      box-sizing: border-box;
      cursor: grab;
    }

    [data-theme="light"] .minimap-viewport {
      background: rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.45);
    }

    .minimap-viewport:active { cursor: grabbing; }

    .minimap-offset-label {
      position: absolute;
      top: -20px;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text);
      opacity: 0.55;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .minimap-offset-label--left  { left: 0; }
    .minimap-offset-label--right { right: 0; }

    /* === Recording viewer header === */
    .viewer-header {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--btn-border);
      border-radius: 10px;
      padding: 6px 10px 6px 14px;
      z-index: 30;
      pointer-events: auto;
      white-space: nowrap;
    }

    .viewer-filename {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--btn-text);
    }

    .viewer-duration {
      font-size: 0.72rem;
      color: var(--btn-text);
      opacity: 0.6;
    }

    .viewer-close-btn {
      width: 28px !important;
      height: 28px !important;
      border-radius: 6px !important;
      flex-shrink: 0;
    }

    .recording-timer {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--primary);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 20;
      /* Fixed width so changing digits don't resize the pill */
      width: max-content;
      min-width: 120px;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    .recording-dot {
      width: 8px;
      height: 8px;
      background-color: white;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0.3;
      }
    }

    /* === Info button & panel === */
    .info-btn-wrapper {
      position: relative;
      display: flex;
    }

    .info-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--btn-border);
      color: var(--btn-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      font-style: italic;
      font-family: Georgia, serif;
      transition: all 0.2s;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    .info-btn:focus,
    .info-btn:focus-visible { outline: none; }

    .info-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .info-panel {
      position: absolute;
      bottom: calc(100% + 10px);
      right: 0;
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--btn-border);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 180px;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .info-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .info-panel-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .info-panel table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.74rem;
      color: var(--text);
    }

    .info-panel td {
      padding: 2px 0;
    }

    .info-panel td:first-child {
      opacity: 0.55;
      padding-right: 12px;
      white-space: nowrap;
    }

    .info-panel td:last-child {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    /* File manager modal */
    /* === Recordings dropup === */
    .recordings-dropup {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      padding: 10px;
      min-width: 300px;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      z-index: 500;
    }

    .recordings-dropup.open {
      display: block;
    }

    .recordings-dropup-header {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.55;
      padding: 4px 6px 8px;
    }

    .file-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(128, 128, 128, 0.08);
      margin-bottom: 6px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .file-item:hover {
      background: rgba(128, 128, 128, 0.16);
    }

    .file-name {
      color: var(--text);
      font-size: 0.8rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-actions {
      display: flex;
      gap: 6px;
    }

    .file-action-btn {
      background: transparent;
      border: 1.5px solid var(--btn-border);
      color: var(--btn-text);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .file-action-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: scale(1.05);
    }

    .no-files {
      text-align: center;
      color: var(--text);
      font-size: 0.82rem;
      padding: 16px;
      opacity: 0.5;
    }

    /* === Toast notification — pops up above the recordings button === */
    .rec-toast {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      min-width: 220px;
      max-width: 300px;
      background: var(--popup-bg);
      border: 1px solid var(--btn-border);
      border-left: 3px solid #2ecc71;
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--btn-text);
      font-size: 0.82rem;
      line-height: 1.6;
      z-index: 2000;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, transform 0.3s ease,
        visibility 0s linear 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .rec-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      transition: opacity 0.3s ease, transform 0.3s ease,
        visibility 0s linear 0s;
    }

    .rec-toast strong {
      color: #2ecc71;
      display: block;
      margin-bottom: 2px;
      font-size: 0.88rem;
    }

    .btn.recording {
      border-color: var(--primary);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    .btn {
      background: transparent;
      border: 2px solid var(--btn-border);
      color: var(--btn-text);
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      position: relative;
      flex-shrink: 0;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .btn:hover:not(:disabled) {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn:focus,
    .btn:focus-visible {
      outline: none;
    }

    /* Theme toggle & fullscreen-inside-fullscreen toggle */
    .theme-toggle,
    .fullscreen-theme-toggle {
      position: absolute;
      bottom: 20px;
      right: 15px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--btn-border);
      color: var(--btn-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 99999;
      transition: all 0.3s;
      touch-action: manipulation;
    }

    .theme-toggle:focus,
    .theme-toggle:focus-visible,
    .fullscreen-theme-toggle:focus,
    .fullscreen-theme-toggle:focus-visible {
      outline: none;
    }

    .theme-toggle:hover,
    .fullscreen-theme-toggle:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: scale(1.1);
    }

    .theme-toggle svg,
    .fullscreen-theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    .theme-icon-moon { display: none; }
    [data-theme="light"] .theme-icon-sun { display: none; }
    [data-theme="light"] .theme-icon-moon { display: block; }


    /* === Mobile layout === */
    /* Portrait: 2×2 button grid */
    @media (max-width: 480px) {
      .overlay-top {
        top: 10px;
        gap: 6px;
      }

      .overlay-metric {
        padding: 4px 8px;
        font-size: 0.7rem;
      }

      .overlay-bpm {
        padding: 0 12px;
        height: 36px;
        font-size: 1rem;
        gap: 3px;
      }

      .heart-icon {
        width: 22px;
        height: 22px;
      }

      .btn {
        width: 36px;
        height: 36px;
      }

      .theme-toggle,
      .fullscreen-theme-toggle {
        width: 28px;
        height: 28px;
      }

      .fullscreen-btn {
        width: 32px;
        height: 32px;
      }

      .fullscreen-btn svg {
        width: 16px;
        height: 16px;
      }
    }

    @media (orientation: portrait) and (max-width: 600px) {
      .controls-overlay {
        bottom: 15px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        max-width: 320px;
      }

      /* Dropup: fixed so it can't clip off-screen */
      .recordings-dropup {
        position: fixed;
        bottom: 100px;
        left: 10px;
        right: 10px;
        min-width: unset;
        max-height: 50vh;
      }
    }

    /* Landscape: single row, no wrap */
    @media (orientation: landscape) and (max-height: 500px) {
      .controls-overlay {
        flex-wrap: nowrap;
        bottom: 10px;
        gap: 6px;
      }

      .btn {
        padding: 5px 8px;
        font-size: 11px;
        min-width: 0;
      }
    }

    @media (max-width: 360px) {
      .overlay-top {
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
    }
  </style>
</head>

<body>
  <!-- Fullscreen display container -->
  <div id="deviceContainer"></div>

  <!-- Theme toggle button (hidden — theme is toggled via the overlay button) -->
  <button class="theme-toggle" aria-label="Toggle theme" style="display:none">
    <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </svg>
    <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>
    </svg>
  </button>

  <script src="webglplot.umd.js"></script>
  <script>
    const { WebglPlot, ColorRGBA, WebglLine } = WebglPlotBundle;

    // === Filter Classes ===
    class NotchFilter {
      constructor() {
        this.z1_1 = 0; this.z2_1 = 0;
        this.z1_2 = 0; this.z2_2 = 0;
      }
      process(input) {
        let output = input;
        this.x_1 = output - (-1.56858163 * this.z1_1) - (0.96424138 * this.z2_1);
        output = 0.96508099 * this.x_1 + (-1.56202714 * this.z1_1) + (0.96508099 * this.z2_1);
        this.z2_1 = this.z1_1;
        this.z1_1 = this.x_1;
        this.x_2 = output - (-1.61100358 * this.z1_2) - (0.96592171 * this.z2_2);
        output = 1.0 * this.x_2 + (-1.61854514 * this.z1_2) + (1.0 * this.z2_2);
        this.z2_2 = this.z1_2;
        this.z1_2 = this.x_2;
        return output;
      }
    }
    class ECGFilter {
      constructor() { this.z1 = 0; this.z2 = 0; }
      process(input) {
        let output = input;
        this.x1 = output - (-1.47548044 * this.z1) - (0.58691951 * this.z2);
        output = 0.02785977 * this.x1 + (0.05571953 * this.z1) + (0.02785977 * this.z2);
        this.z2 = this.z1; this.z1 = this.x1;
        return output;
      }
    }

    // BLE constants and parameters
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const DATA_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const CONTROL_CHAR_UUID = "0000ff01-0000-1000-8000-00805f9b34fb";
    const BLOCK_COUNT = 10;
    const DEBOUNCE_TIME = 1000;
    const NUM_POINTS = 2000;
    const SAMPLE_RATE = 500;
    const MIN_RECORDING_MS = 12000; // minimum recording duration before stop is allowed / recording is saved
    const SQI_FLAT_THRESHOLD = 1e-4; // EMA power below this → flat-line / electrodes off
    const RR_CV_THRESHOLD = 0.25;    // RR-interval coefficient of variation above this → noise, not ECG

    // === Pan-Tompkins R-peak Detector (adapted for 500 Hz) ===
    // Algorithm follows the firmware exactly; all timing constants are scaled
    // by 4× (500 Hz / 125 Hz) from the reference firmware.
    class PanTompkinsDetector {
      constructor(fs) {
        this.fs = fs;
        const s = fs / 125;                         // scale factor = 4
        this.MWI_WIN = Math.round(20 * s); // 80 samples  (~160 ms)
        this.REFRACT = Math.round(25 * s); // 100 samples (~200 ms)
        this.LEARN_N = fs * 2;             // 1000 samples (2 s) — fast calibration
        this.R_BACK = Math.round(22 * s); // 88 samples
        this.R_FWD = Math.round(3 * s); // 12 samples
        this.TW_MIN = Math.round(25 * s); // 100 samples
        this.TW_MAX = Math.round(45 * s); // 180 samples
        this.TW_SLOPE_RATIO = 0.5;
        this.RECOVER_MIN_GAP = Math.round(fs / 2); // 250 samples
        this.NO_QRS_ABS = fs;                 // 500 samples
        this.MW_BASE_ALPHA = 0.01;
        this.DECAY_SPKI = 0.50;
        this.ECG_HIST_LEN = Math.round(240 * s);// 960 samples

        // ECG circular history (for R-peak localisation)
        this.ecgHist = new Float64Array(this.ECG_HIST_LEN);
        this.slopeHist = new Float64Array(this.ECG_HIST_LEN);
        this.ecgTime = new Uint32Array(this.ECG_HIST_LEN);
        this.ecgW = 0;

        // 5-point derivative ring buffer
        this.dBuf = new Float64Array(5);
        this.dW = 0;

        // Moving Window Integrator
        this.mwiBuf = new Float64Array(this.MWI_WIN);
        this.mwiW = 0;
        this.mwiSum = 0;

        // 3-point MWI peak tracker
        this.m0 = 0; this.t0 = 0;
        this.m1 = 0; this.t1 = 0;
        this.m2 = 0; this.t2 = 0;

        // Adaptive thresholds
        this.SPKI = 0; this.NPKI = 0;
        this.TH1 = 0; this.TH2 = 0;

        // QRS state
        this.lastQRS = 0;
        this.lastQRSSlope = 0;

        // RR interval history (8 beats)
        this.rrBuf = new Float64Array(8);
        this.rrW = 0; this.rrN = 0;
        this.rrAvg = fs; // start at 1 s

        // Searchback candidate
        this.sbPeakVal = 0;
        this.sbPeakTime = 0;

        // Learning phase accumulators
        this.learnCount = 0;
        this.learnMax = 0;
        this.learnSum = 0;

        // Watchdog noise baseline
        this.mwBaseInit = false;
        this.mwBase = 0;
        this.lastRecover = 0;

        // BPM tracking (own rolling average, separate from RR)
        this.bpmHist = new Float64Array(8);
        this.bpmHW = 0; this.bpmHN = 0;
        this.bpm = 0;
        this.lastRTime = 0;

        // Absolute sample counter
        this.n = 0;
      }

      // Reset all state (call before each new streaming session)
      reset() {
        this.ecgHist.fill(0); this.slopeHist.fill(0); this.ecgTime.fill(0); this.ecgW = 0;
        this.dBuf.fill(0); this.dW = 0;
        this.mwiBuf.fill(0); this.mwiW = 0; this.mwiSum = 0;
        this.m0 = 0; this.t0 = 0; this.m1 = 0; this.t1 = 0; this.m2 = 0; this.t2 = 0;
        this.SPKI = 0; this.NPKI = 0; this.TH1 = 0; this.TH2 = 0;
        this.lastQRS = 0; this.lastQRSSlope = 0;
        this.rrBuf.fill(0); this.rrW = 0; this.rrN = 0; this.rrAvg = this.fs;
        this.sbPeakVal = 0; this.sbPeakTime = 0;
        this.learnCount = 0; this.learnMax = 0; this.learnSum = 0;
        this.mwBaseInit = false; this.mwBase = 0; this.lastRecover = 0;
        this.bpmHist.fill(0); this.bpmHW = 0; this.bpmHN = 0; this.bpm = 0; this.lastRTime = 0;
        this.n = 0;
      }

      _deriv5(x) {
        this.dBuf[this.dW] = x;
        this.dW = (this.dW + 1) % 5;
        const i = this.dW;
        const xn2 = this.dBuf[(i + 3) % 5];
        const xn1 = this.dBuf[(i + 4) % 5];
        const xp1 = this.dBuf[(i + 1) % 5];
        const xp2 = this.dBuf[(i + 2) % 5];
        return (-xn2 - 2 * xn1 + 2 * xp1 + xp2) / 8.0;
      }

      _mwi(x) {
        this.mwiSum -= this.mwiBuf[this.mwiW];
        this.mwiBuf[this.mwiW] = x;
        this.mwiSum += x;
        this.mwiW = (this.mwiW + 1) % this.MWI_WIN;
        return this.mwiSum / this.MWI_WIN;
      }

      _rrUpdate(rr) {
        this.rrBuf[this.rrW] = rr;
        this.rrW = (this.rrW + 1) & 7;
        if (this.rrN < 8) this.rrN++;
        let s = 0;
        for (let i = 0; i < this.rrN; i++) s += this.rrBuf[i];
        this.rrAvg = s / this.rrN;
      }

      _bpmUpdate(rTime) {
        if (this.lastRTime === 0) { this.lastRTime = rTime; return; }
        const rr = rTime - this.lastRTime;
        this.lastRTime = rTime;
        if (rr < 10 || rr > this.fs * 3) return;
        this.bpmHist[this.bpmHW] = rr;
        this.bpmHW = (this.bpmHW + 1) & 7;
        if (this.bpmHN < 8) this.bpmHN++;
        let sum = 0;
        for (let i = 0; i < this.bpmHN; i++) sum += this.bpmHist[i];
        this.bpm = (60 * this.fs) / (sum / this.bpmHN);
      }

      // Coefficient of variation of recent RR intervals.
      // Real ECG: CV typically < 0.15. Random noise: CV > 0.30.
      // Returns 1.0 (treated as "bad") until at least 4 intervals are recorded.
      _rrCV() {
        if (this.bpmHN < 4) return 1.0;
        let sum = 0;
        for (let i = 0; i < this.bpmHN; i++) sum += this.bpmHist[i];
        const mean = sum / this.bpmHN;
        if (mean <= 0) return 1.0;
        let sumSq = 0;
        for (let i = 0; i < this.bpmHN; i++) {
          const d = this.bpmHist[i] - mean;
          sumSq += d * d;
        }
        return Math.sqrt(sumSq / this.bpmHN) / mean;
      }

      _slopeAround(timeCenter, halfWin) {
        let best = 0;
        for (let k = 0; k < this.ECG_HIST_LEN; k++) {
          const idx = (this.ecgW + this.ECG_HIST_LEN - 1 - k) % this.ECG_HIST_LEN;
          const dt = (this.ecgTime[idx] | 0) - (timeCenter | 0);
          if (dt > halfWin) continue;
          if (dt < -halfWin) break;
          if (this.slopeHist[idx] > best) best = this.slopeHist[idx];
        }
        return best;
      }

      // Find the true R-peak location in ECG history near the MWI-detected QRS time.
      // Searches for the maximum POSITIVE value (R-peaks are always the tallest
      // positive deflection for standard ECG lead placement).
      _findRpeak(qrsTime) {
        let bestVal = -Infinity, bestSlope = -1, bestTime = 0;
        for (let k = 0; k < this.ECG_HIST_LEN; k++) {
          const idx = (this.ecgW + this.ECG_HIST_LEN - 1 - k) % this.ECG_HIST_LEN;
          const dt = (this.ecgTime[idx] | 0) - (qrsTime | 0);
          if (dt > this.R_FWD) continue;
          if (dt < -this.R_BACK) break;
          const v = this.ecgHist[idx]; // signed — we want max positive
          const s = this.slopeHist[idx];
          if (v > bestVal || (v === bestVal && s > bestSlope)) {
            bestVal = v; bestSlope = s; bestTime = this.ecgTime[idx];
          }
        }
        return bestTime > 0 ? bestTime : null;
      }

      _updateTH() {
        this.TH1 = this.NPKI + 0.25 * (this.SPKI - this.NPKI);
        this.TH2 = 0.40 * this.TH1;
      }

      _acceptQRS(peakTime) {
        if (this.lastQRS !== 0) {
          const dt = peakTime - this.lastQRS;
          if (dt < this.REFRACT) return false;
          if (dt >= this.TW_MIN && dt <= this.TW_MAX) {
            const sNow = this._slopeAround(peakTime, 2);
            if (this.lastQRSSlope > 0 && sNow < this.TW_SLOPE_RATIO * this.lastQRSSlope)
              return false;
          }
          if (this.rrN >= 2 && (peakTime - this.lastQRS) < 0.30 * this.rrAvg)
            return false;
        }
        return true;
      }

      _watchdog() {
        if (this.n < this.LEARN_N || this.lastQRS === 0) return;
        let blindLimit = Math.floor(1.5 * this.rrAvg);
        if (blindLimit < this.NO_QRS_ABS) blindLimit = this.NO_QRS_ABS;
        if ((this.n - this.lastQRS) <= blindLimit) return;
        if ((this.n - this.lastRecover) < this.RECOVER_MIN_GAP) return;
        this.lastRecover = this.n;
        this.SPKI *= this.DECAY_SPKI;
        this.NPKI = 0.90 * this.NPKI + 0.10 * this.mwBase;
        if (this.NPKI < 1e-12) this.NPKI = 1e-12;
        if (this.SPKI < this.NPKI) this.SPKI = this.NPKI;
        this._updateTH();
        this.sbPeakVal = 0; this.sbPeakTime = 0;
      }

      // Returns sample-time of R-peak or null
      _handleMWIPeak(peakVal, peakTime) {
        if (this.n < this.LEARN_N) {
          this.learnCount++;
          this.learnSum += peakVal;
          if (peakVal > this.learnMax) this.learnMax = peakVal;
          if (this.n === this.LEARN_N - 1) {
            this.SPKI = this.learnMax;
            this.NPKI = this.learnCount > 0
              ? this.learnSum / this.learnCount
              : 0.1 * this.learnMax;
            this._updateTH();
          }
          return null;
        }
        const isQRS = peakVal >= this.TH1 && this._acceptQRS(peakTime);
        if (!isQRS) {
          this.NPKI = 0.125 * peakVal + 0.875 * this.NPKI;
          this._updateTH();
          if (peakVal > this.TH2 && peakVal > this.sbPeakVal) {
            this.sbPeakVal = peakVal;
            this.sbPeakTime = peakTime;
          }
          return null;
        }
        const rr = this.lastQRS === 0 ? this.rrAvg : (peakTime - this.lastQRS);
        this.lastQRS = peakTime;
        this._rrUpdate(rr);
        this.lastQRSSlope = this._slopeAround(peakTime, 2);
        this.SPKI = 0.125 * peakVal + 0.875 * this.SPKI;
        this._updateTH();
        this.sbPeakVal = 0; this.sbPeakTime = 0;
        const rT = this._findRpeak(peakTime);
        const rTime = rT !== null ? rT : peakTime;
        this._bpmUpdate(rTime);
        return rTime;
      }

      _searchback() {
        if (this.n < this.LEARN_N || this.lastQRS === 0) return null;
        if ((this.n - this.lastQRS) <= 1.66 * this.rrAvg) return null;
        if (this.sbPeakTime !== 0 && this.sbPeakVal >= this.TH2 &&
          this._acceptQRS(this.sbPeakTime)) {
          const rr = this.sbPeakTime - this.lastQRS;
          this.lastQRS = this.sbPeakTime;
          this._rrUpdate(rr);
          this.lastQRSSlope = this._slopeAround(this.sbPeakTime, 2);
          this.SPKI = 0.125 * this.sbPeakVal + 0.875 * this.SPKI;
          this._updateTH();
          const rT = this._findRpeak(this.sbPeakTime);
          const rTime = rT !== null ? rT : this.sbPeakTime;
          this.sbPeakVal = 0; this.sbPeakTime = 0;
          this._bpmUpdate(rTime);
          return rTime;
        }
        this.sbPeakVal = 0; this.sbPeakTime = 0;
        this.NPKI *= 0.95;
        this._updateTH();
        return null;
      }

      // Feed one filtered ECG sample; returns absolute sample-time of R-peak or null
      process(ecgSample) {
        const n = this.n;
        const d = this._deriv5(ecgSample);
        const slope = Math.abs(d);
        const mw = this._mwi(d * d);

        // Store ECG history for R-peak localisation
        this.ecgHist[this.ecgW] = ecgSample;
        this.slopeHist[this.ecgW] = slope;
        this.ecgTime[this.ecgW] = n;
        this.ecgW = (this.ecgW + 1) % this.ECG_HIST_LEN;

        // Shift 3-point MWI window
        this.m0 = this.m1; this.t0 = this.t1;
        this.m1 = this.m2; this.t1 = this.t2;
        this.m2 = mw; this.t2 = n;

        // Watchdog baseline
        if (n >= this.LEARN_N) {
          if (!this.mwBaseInit) { this.mwBase = mw; this.mwBaseInit = true; }
          if (mw < this.TH1)
            this.mwBase = (1 - this.MW_BASE_ALPHA) * this.mwBase + this.MW_BASE_ALPHA * mw;
          this._watchdog();
        }

        let rPeak = null;
        if (n >= 2 && this.m1 > this.m0 && this.m1 >= this.m2)
          rPeak = this._handleMWIPeak(this.m1, this.t1);
        const sb = this._searchback();
        if (sb !== null) rPeak = sb;

        this.n++;
        return rPeak; // absolute sample-time, or null
      }
    }
